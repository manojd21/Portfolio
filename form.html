<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.form-container {
    width: 100%;
    max-width: 500px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,.1);
}

h2 {
    margin-bottom: 20px;
    text-align: center;
}

input,
textarea {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

textarea {
    min-height: 140px;
    resize: vertical;
}

button {
    width: 100%;
    padding: 14px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    opacity: .9;
}

#status {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="form-container">

    <h2>Contact Us</h2>

    <form id="contactForm">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your Email"
            required>

        <input
            type="tel"
            name="phone"
            placeholder="Phone Number">

        <textarea
            name="message"
            placeholder="Your Message"
            required></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

    <div id="status"></div>

</div>

<script>
const form = document.getElementById("contactForm");
const status = document.getElementById("status");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    status.textContent = "Sending...";

    const formData = new FormData(form);

    try {

        const response = await fetch(
            "https://manojd4.app.n8n.cloud/webhook/html-form",
            {
                method: "POST",
                body: formData
            }
        );

        if(response.ok){
            status.style.color = "green";
            status.textContent = "Message sent successfully!";
            form.reset();
        }else{
            status.style.color = "red";
            status.textContent = "Server Error (" + response.status + ")";
        }

    } catch(error){

        status.style.color = "red";
        status.textContent = "Unable to connect to server.";

        console.error(error);

    }

});
</script>

</body>
</html>
